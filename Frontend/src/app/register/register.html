<div class="flex justify-center items-center h-screen bg-gradient-to-r from-blue-100 to-purple-100">

  <form [formGroup]="form" (ngSubmit)="submit()" 
        class="bg-white p-8 rounded-2xl shadow-xl w-96 space-y-5">

    <h2 class="text-2xl font-bold text-center text-gray-700">Create Account</h2>

    <!-- Username -->
    <div class="relative mt-6">

  <input type="text" formControlName="username"
    class="peer w-full pt-6 pb-2 bg-transparent border-b-2 border-gray-300 
           focus:outline-none focus:border-blue-500"
    placeholder=" " />

  <label class="absolute left-0 top-5 text-gray-500 transition-all
    peer-placeholder-shown:top-5 peer-placeholder-shown:text-base
    peer-focus:top-1 peer-focus:text-sm peer-focus:text-blue-500">
    Username
  </label>

  <span class="absolute bottom-0 left-0 w-0 h-[2px] bg-blue-500 
               transition-all duration-300 peer-focus:w-full"></span>

  <p *ngIf="f.username.touched && f.username.invalid"
     class="text-red-500 text-xs mt-1 bg-red-50 px-2 py-1 rounded">
    Only lowercase, min 4 chars
  </p>

</div>

    <!-- Password -->
    <div class="relative mt-6">

  <input [type]="showPassword ? 'text' : 'password'"
    formControlName="password"
    class="peer w-full pr-12 pt-6 pb-2 bg-transparent border-b-2 border-gray-300 
           focus:outline-none focus:border-blue-500"
    placeholder=" " />

  <label class="absolute left-0 top-5 text-gray-500 transition-all
    peer-placeholder-shown:top-5 peer-placeholder-shown:text-base
    peer-focus:top-1 peer-focus:text-sm peer-focus:text-blue-500">
    Password
  </label>

  <span (click)="togglePassword()"
        class="absolute right-0 top-4 text-blue-500 cursor-pointer text-sm">
    {{ showPassword ? 'Hide' : 'Show' }}
  </span>

  <span class="absolute bottom-0 left-0 w-0 h-[2px] bg-blue-500 
               transition-all duration-300 peer-focus:w-full"></span>

  <p *ngIf="f.password.touched && f.password.invalid"
     class="text-red-500 text-xs mt-1 bg-red-50 px-2 py-1 rounded">
    Weak password
  </p>

  

</div>

    <!-- Name -->
    <div class="relative mt-6">

  <input type="text" formControlName="name"
    class="peer w-full pt-6 pb-2 bg-transparent border-b-2 border-gray-300 
           focus:outline-none focus:border-blue-500"
    placeholder=" " />

  <label class="absolute left-0 top-5 text-gray-500 transition-all
    peer-placeholder-shown:top-5 peer-placeholder-shown:text-base
    peer-focus:top-1 peer-focus:text-sm peer-focus:text-blue-500">
    Name
  </label>

  <span class="absolute bottom-0 left-0 w-0 h-[2px] bg-blue-500 
               transition-all duration-300 peer-focus:w-full"></span>

  <p *ngIf="f.name.touched && f.name.invalid"
     class="text-red-500 text-xs mt-1 bg-red-50 px-2 py-1 rounded">
    Only alphabets
  </p>

</div>

    <!-- Email -->
    <div class="relative mt-6">

  <input type="email" formControlName="email"
    class="peer w-full pt-6 pb-2 bg-transparent border-b-2 border-gray-300 
           focus:outline-none focus:border-blue-500"
    placeholder=" " />

  <label class="absolute left-0 top-5 text-gray-500 transition-all
    peer-placeholder-shown:top-5 peer-placeholder-shown:text-base
    peer-focus:top-1 peer-focus:text-sm peer-focus:text-blue-500">
    Email
  </label>

  <span class="absolute bottom-0 left-0 w-0 h-[2px] bg-blue-500 
               transition-all duration-300 peer-focus:w-full"></span>

  <p *ngIf="f.email.touched && f.email.invalid"
     class="text-red-500 text-xs mt-1 bg-red-50 px-2 py-1 rounded">
    Invalid email
  </p>

</div>

    <!-- Phone -->
    <div class="relative mt-6">

  <!-- +91 prefix -->
  <span class="absolute left-0 top-5 text-gray-500 text-sm">
    +91
  </span>

  <input type="text" formControlName="phone"
    class="peer w-full pl-10 pt-6 pb-2 bg-transparent border-b-2 border-gray-300 
           focus:outline-none focus:border-blue-500"
    placeholder=" " />

  <label class="absolute left-10 top-5 text-gray-500 transition-all
    peer-placeholder-shown:top-5 peer-placeholder-shown:text-base
    peer-focus:top-1 peer-focus:text-sm peer-focus:text-blue-500">
    Phone
  </label>

  <span class="absolute bottom-0 left-0 w-0 h-[2px] bg-blue-500 
               transition-all duration-300 peer-focus:w-full"></span>

  <p *ngIf="f.phone.touched && f.phone.invalid"
     class="text-red-500 text-xs mt-1 bg-red-50 px-2 py-1 rounded">
    Must be 10 digits
  </p>

</div>

    <!-- Button -->
    <button [disabled]="form.invalid || loading"
      class="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 text-white p-2 rounded transition">

      <span *ngIf="!loading">Register</span>
      <span *ngIf="loading">Registering...</span>

    </button>

    <p class="text-center text-sm">
      Already have account?
      <a routerLink="/login" class="text-blue-500 font-medium">Login</a>
    </p>

  </form>
</div>
