<div class="min-h-screen flex items-center justify-center px-4">
  <form [formGroup]="form" (ngSubmit)="submit()" class="glass-panel neon-border w-full max-w-md p-8 space-y-5">
    <h2 class="text-3xl font-bold text-center text-amber-300">Welcome Back</h2>

    <div class="space-y-2">
      <label for="login-username" class="text-sm text-slate-300">Username</label>
      <input id="login-username" type="text" formControlName="username" placeholder="Enter username"
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-fuchsia-500" />
      <p *ngIf="f.username.touched && f.username.invalid" class="text-red-400 text-xs">Username required</p>
    </div>

    <div class="space-y-2">
      <label for="login-password" class="text-sm text-slate-300">Password</label>
      <div class="relative">
        <input id="login-password" [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Enter password"
          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 pr-14 outline-none focus:ring-2 focus:ring-fuchsia-500" />
        <button type="button" (click)="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-fuchsia-300 text-sm">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>
      <p *ngIf="f.password.touched && f.password.invalid" class="text-red-400 text-xs">Password required</p>
    </div>

    <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
      <input type="checkbox" formControlName="remember" class="accent-fuchsia-500 w-4 h-4" />
      Remember Me
    </label>

    <button [disabled]="form.invalid"
      class="w-full bg-fuchsia-700 hover:bg-fuchsia-600 disabled:bg-slate-700 text-white py-2 rounded-lg transition">
      Login
    </button>

    <p class="text-center text-sm text-slate-300">
      Create Account?
      <a routerLink="/register" class="text-amber-300 font-medium">Register</a>
    </p>
  </form>
</div>
