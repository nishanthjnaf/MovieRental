<div class="flex justify-center items-center h-screen bg-gradient-to-r from-green-100 to-blue-100">

  <form [formGroup]="form" (ngSubmit)="submit()" 
        class="bg-white p-8 rounded-2xl shadow-xl w-96 space-y-6">

    <h2 class="text-2xl font-bold text-center text-gray-700">Welcome Back</h2>

    <!-- Username -->
    <div class="relative">

      <input type="text" formControlName="username"
        class="peer w-full pt-6 pb-2 bg-transparent border-b-2 border-gray-300 
               focus:outline-none focus:border-green-500"
        placeholder=" " />

      <label class="absolute left-0 top-5 text-gray-500 transition-all
        peer-placeholder-shown:top-5 peer-placeholder-shown:text-base
        peer-focus:top-1 peer-focus:text-sm peer-focus:text-green-500">

        Username
      </label>

      <span class="absolute bottom-0 left-0 w-0 h-[2px] bg-green-500 
                   transition-all duration-300 peer-focus:w-full"></span>

      <p *ngIf="f.username.touched && f.username.invalid"
         class="text-red-500 text-xs mt-1 bg-red-50 px-2 py-1 rounded">
        Username required
      </p>

    </div>

    <!-- Password -->
    <div class="relative">

      <input [type]="showPassword ? 'text' : 'password'"
        formControlName="password"
        class="peer w-full pr-12 pt-6 pb-2 bg-transparent border-b-2 border-gray-300 
               focus:outline-none focus:border-green-500"
        placeholder=" " />

      <label class="absolute left-0 top-5 text-gray-500 transition-all
        peer-placeholder-shown:top-5 peer-placeholder-shown:text-base
        peer-focus:top-1 peer-focus:text-sm peer-focus:text-green-500">

        Password
      </label>

      <!-- Show / Hide -->
      <span (click)="togglePassword()"
            class="absolute right-0 top-4 text-green-500 cursor-pointer text-sm">
        {{ showPassword ? 'Hide' : 'Show' }}
      </span>

      <span class="absolute bottom-0 left-0 w-0 h-[2px] bg-green-500 
                   transition-all duration-300 peer-focus:w-full"></span>

      <p *ngIf="f.password.touched && f.password.invalid"
         class="text-red-500 text-xs mt-1 bg-red-50 px-2 py-1 rounded">
        Password required
      </p>

    </div>

    <!-- Remember Me -->
    <div class="flex items-center gap-2 mt-2">
      <input type="checkbox" formControlName="remember"
        class="accent-green-500 w-4 h-4 cursor-pointer" />
      <label class="text-sm text-gray-600 cursor-pointer">Remember Me</label>
    </div>

    <!-- Button -->
    <button [disabled]="form.invalid"
      class="w-full bg-green-500 hover:bg-green-600 disabled:bg-gray-400 text-white p-2 rounded transition">

      Login
    </button>

    <!-- Navigation -->
    <p class="text-center text-sm">
      Create Account?
      <a routerLink="/register" class="text-green-500 font-medium">Register</a>
    </p>

  </form>
</div>
