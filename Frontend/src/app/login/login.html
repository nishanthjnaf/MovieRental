<div class="auth-page">

  <!-- Left brand panel -->
  <div class="auth-brand">
    <div class="auth-brand__content">
      <div class="auth-brand__logo">cinefilia</div>
      <h2 class="auth-brand__tagline">Your cinema,<br>your schedule.</h2>
      <p class="auth-brand__sub">Thousands of films available to rent instantly. Watch on any device, anytime.</p>
      <div class="auth-brand__dots">
        <span class="auth-brand__dot auth-brand__dot--active"></span>
        <span class="auth-brand__dot"></span>
        <span class="auth-brand__dot"></span>
      </div>
    </div>
    <div class="auth-brand__overlay"></div>
  </div>

  <!-- Right form panel -->
  <div class="auth-form-panel">
    <div class="auth-form-wrap">

      <div class="auth-form-header">
        <h1 class="auth-form-header__title">Welcome back</h1>
        <p class="auth-form-header__sub">Sign in to continue watching</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">

        <div class="auth-field">
          <label class="auth-field__label">Username</label>
          <input type="text" formControlName="username" placeholder="Enter your username"
            class="auth-field__input" [class.auth-field__input--error]="f.username.touched && f.username.invalid" />
          <p *ngIf="f.username.touched && f.username.invalid" class="auth-field__error">Username is required</p>
        </div>

        <div class="auth-field">
          <label class="auth-field__label">Password</label>
          <div class="auth-field__input-wrap">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Enter your password"
              class="auth-field__input" [class.auth-field__input--error]="f.password.touched && f.password.invalid" />
            <button type="button" class="auth-field__toggle" (click)="togglePassword()">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <p *ngIf="f.password.touched && f.password.invalid" class="auth-field__error">Password is required</p>
        </div>

        <label class="auth-remember">
          <input type="checkbox" formControlName="remember" class="auth-remember__check" />
          <span>Remember me</span>
        </label>

        <button type="submit" class="auth-submit" [disabled]="form.invalid">Sign In</button>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <div class="auth-social">
          <a href="http://localhost:5287/api/OAuth/login/google" class="auth-social__btn auth-social__btn--google">
            <svg viewBox="0 0 24 24" class="auth-social__icon">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </a>
        </div>

        <p class="auth-switch">
          Don't have an account?
          <a routerLink="/register" class="auth-switch__link">Create one</a>
        </p>

      </form>
    </div>
  </div>

</div>
