<div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
  <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">

    <!-- Progress bar -->
    <div class="h-1 bg-slate-800">
      <div class="h-1 bg-amber-400 transition-all duration-300"
        [style.width.%]="(step / 3) * 100"></div>
    </div>

    <div class="p-6">

      <!-- Step 1: Genres -->
      <div *ngIf="step === 1">
        <h2 class="text-2xl font-bold text-amber-300 mb-1">What genres do you enjoy?</h2>
        <p class="text-slate-400 text-sm mb-5">Pick as many as you like. We'll use this to suggest movies.</p>
        <div class="flex flex-wrap gap-2 max-h-64 overflow-y-auto">
          <button *ngFor="let g of genres"
            (click)="toggleGenre(g.name)"
            class="px-4 py-2 rounded-full text-sm border transition-colors"
            [class.bg-amber-500]="selectedGenres.has(g.name)"
            [class.border-amber-500]="selectedGenres.has(g.name)"
            [class.text-black]="selectedGenres.has(g.name)"
            [class.border-slate-600]="!selectedGenres.has(g.name)"
            [class.text-slate-300]="!selectedGenres.has(g.name)"
            [class.hover:border-amber-400]="!selectedGenres.has(g.name)">
            {{ g.name }}
          </button>
        </div>
      </div>

      <!-- Step 2: Languages -->
      <div *ngIf="step === 2">
        <h2 class="text-2xl font-bold text-amber-300 mb-1">Preferred languages?</h2>
        <p class="text-slate-400 text-sm mb-5">Select the languages you prefer to watch movies in.</p>
        <div class="flex flex-wrap gap-2">
          <button *ngFor="let lang of languages"
            (click)="toggleLanguage(lang)"
            class="px-4 py-2 rounded-full text-sm border transition-colors"
            [class.bg-fuchsia-600]="selectedLanguages.has(lang)"
            [class.border-fuchsia-600]="selectedLanguages.has(lang)"
            [class.text-white]="selectedLanguages.has(lang)"
            [class.border-slate-600]="!selectedLanguages.has(lang)"
            [class.text-slate-300]="!selectedLanguages.has(lang)">
            {{ lang }}
          </button>
        </div>
      </div>

      <!-- Step 3: Theme -->
      <div *ngIf="step === 3">
        <h2 class="text-2xl font-bold text-amber-300 mb-1">Choose your theme</h2>
        <p class="text-slate-400 text-sm mb-6">You can always change this later from the top bar.</p>
        <div class="grid grid-cols-2 gap-4">
          <button (click)="setTheme('dark')"
            class="rounded-xl border-2 p-4 flex flex-col items-center gap-2 transition-colors"
            [class.border-amber-400]="selectedTheme === 'dark'"
            [class.border-slate-700]="selectedTheme !== 'dark'">
            <div class="w-full h-16 rounded-lg bg-slate-950 flex items-center justify-center">
              <span class="text-2xl">🌙</span>
            </div>
            <span class="text-sm font-medium">Dark</span>
          </button>
          <button (click)="setTheme('light')"
            class="rounded-xl border-2 p-4 flex flex-col items-center gap-2 transition-colors"
            [class.border-amber-400]="selectedTheme === 'light'"
            [class.border-slate-700]="selectedTheme !== 'light'">
            <div class="w-full h-16 rounded-lg bg-slate-100 flex items-center justify-center">
              <span class="text-2xl">☀️</span>
            </div>
            <span class="text-sm font-medium">Light</span>
          </button>
        </div>
      </div>

      <!-- Footer buttons -->
      <div class="flex items-center justify-between mt-6">
        <button *ngIf="!editMode" (click)="skip()" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">
          Skip all
        </button>
        <button *ngIf="editMode" (click)="cancel()" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">
          Cancel
        </button>
        <div class="flex gap-2">
          <button *ngIf="step > 1" (click)="back()"
            class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm transition-colors">
            Back
          </button>
          <button *ngIf="step < 3" (click)="next()"
            class="px-5 py-2 rounded-lg bg-amber-600 hover:bg-amber-500 text-sm font-semibold transition-colors">
            Next
          </button>
          <button *ngIf="step === 3" (click)="save()" [disabled]="saving"
            class="px-5 py-2 rounded-lg bg-fuchsia-700 hover:bg-fuchsia-600 text-sm font-semibold transition-colors disabled:opacity-60">
            {{ saving ? 'Saving...' : (editMode ? 'Update Preferences' : 'Save Preferences') }}
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
