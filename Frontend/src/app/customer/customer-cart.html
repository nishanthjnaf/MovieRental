<h2 class="text-5xl font-bold text-amber-300 mb-6">Rental Cart</h2>

<div *ngIf="items.length === 0" class="min-h-[45vh] flex flex-col items-center justify-center gap-4">
  <p class="text-2xl text-slate-300">No movies found</p>
  <button class="bg-amber-600 hover:bg-amber-500 rounded-full px-6 py-2" (click)="goToMovies()">Add Movies</button>
</div>

<div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden" *ngIf="items.length > 0">
  <div *ngFor="let m of items" class="grid grid-cols-12 items-center gap-3 p-3 border-b border-slate-800">
    <img [src]="m.posterPath || 'https://placehold.co/120x80'" class="col-span-2 h-16 w-full object-cover rounded cursor-pointer" (click)="openMovie(m.id)">
    <div class="col-span-4 font-semibold cursor-pointer hover:text-amber-300" (click)="openMovie(m.id)">{{ m.title }} ({{ m.releaseYear }})</div>
    <div class="col-span-2 text-right">
      <input type="number" min="1" max="30" [ngModel]="m.rentalDays || 7" (ngModelChange)="setDays(m.id, $event)"
        class="w-20 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-right">
      <p class="text-xs text-slate-400 mt-1">days</p>
    </div>
    <div class="col-span-2 text-right">₹ {{ priceByMovieId[m.id] ?? '-' }} / day</div>
    <div class="col-span-2 text-right">₹ {{ ((priceByMovieId[m.id] || 0) * (m.rentalDays || 1)) | number:'1.2-2' }}</div>
    <div class="col-span-2 text-right">
      <button class="text-red-300 hover:text-red-200" (click)="remove(m.id)">Remove</button>
    </div>
  </div>

  <div class="p-4 flex flex-wrap items-center justify-between gap-3">
    <div class="text-slate-300">Set rental days per movie.</div>
    <div class="text-xl font-semibold">Total: ₹ {{ total | number:'1.2-2' }}</div>
    <button class="bg-amber-600 hover:bg-amber-500 rounded-full px-6 py-2 disabled:opacity-50" [disabled]="items.length === 0 || loading" (click)="openCheckout()">
      {{ loading ? 'Processing...' : 'Rent Now' }}
    </button>
  </div>
</div>

<div *ngIf="showPaymentPopup" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-slate-900 border border-slate-700 rounded-xl p-5 w-[92%] max-w-md">
    <h3 class="text-xl font-semibold mb-3">Choose payment method</h3>
    <select [(ngModel)]="selectedPaymentMethod" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 mb-4">
      <option [ngValue]="0">Debit Card</option>
      <option [ngValue]="1">Credit Card</option>
      <option [ngValue]="2">Net Banking</option>
      <option [ngValue]="3">UPI</option>
    </select>
    <div class="flex justify-end gap-2">
      <button class="px-4 py-2 rounded bg-slate-700" [disabled]="loading" (click)="showPaymentPopup=false">Cancel</button>
      <button class="px-4 py-2 rounded bg-fuchsia-700 hover:bg-fuchsia-600" [disabled]="loading" (click)="checkout()">
        {{ loading ? 'Processing...' : 'Confirm & Pay' }}
      </button>
    </div>
  </div>
</div>
