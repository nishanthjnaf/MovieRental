<h2 class="text-4xl font-bold text-amber-300 mb-6">My Ratings</h2>

<div *ngIf="loading" class="text-slate-300">Loading ratings...</div>

<div *ngIf="!loading && ratings.length > 0" class="space-y-3">
  <div *ngFor="let r of ratings" class="bg-slate-900 border border-slate-800 rounded-xl p-4">
    <div class="flex items-center justify-between">
      <h3 class="font-semibold text-lg cursor-pointer hover:text-amber-300" (click)="openMovie(r.movieId)">{{ r.movieName }}</h3>
      <div class="flex items-center gap-3">
        <span class="text-fuchsia-300 font-semibold">{{ r.rating | number:'1.1-1' }} / 10</span>
        <button class="text-red-300 hover:text-red-200 text-sm" (click)="removeRating(r.id)">Remove</button>
      </div>
    </div>
    <p class="text-slate-300 mt-2">{{ r.comment || 'No comment' }}</p>
    <p class="text-xs text-slate-400 mt-2">{{ r.reviewDate | date:'medium' }}</p>
  </div>
</div>

<p *ngIf="!loading && ratings.length === 0" class="text-slate-400">No ratings found.</p>
