<div class="min-h-screen bg-slate-950 flex items-center justify-center p-4">
  <div class="relative bg-slate-900 border rounded-2xl p-8 w-full max-w-sm text-center shadow-2xl"
    [class.border-green-500]="success"
    [class.border-red-500]="!success">

    <!-- Close button -->
    <button (click)="close()"
      class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

    <!-- Icon -->
    <div class="flex items-center justify-center w-16 h-16 rounded-full mx-auto mb-4"
      [class.bg-green-500/20]="success"
      [class.bg-red-500/20]="!success">
      <svg *ngIf="success" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      <svg *ngIf="!success" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold mb-2"
      [class.text-green-400]="success"
      [class.text-red-400]="!success">
      {{ success ? 'Payment Successful' : 'Payment Declined' }}
    </h2>

    <!-- Amount -->
    <p class="text-slate-400 text-sm mb-1" *ngIf="amount > 0">
      Amount: <span class="text-white font-semibold">₹ {{ amount | number:'1.2-2' }}</span>
    </p>

    <!-- Message -->
    <p class="text-slate-400 text-sm mt-3">
      {{ success
        ? 'Your rental has been confirmed. Enjoy watching!'
        : 'Your payment could not be processed. Please try again.' }}
    </p>

    <!-- Go to rentals -->
    <button (click)="close()"
      class="mt-6 w-full py-2.5 rounded-lg font-semibold transition-colors"
      [class.bg-green-600]="success"
      [class.hover:bg-green-500]="success"
      [class.bg-red-700]="!success"
      [class.hover:bg-red-600]="!success">
      Go to My Rentals
    </button>

  </div>
</div>
