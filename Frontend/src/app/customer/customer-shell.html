<div class="min-h-screen bg-slate-950 text-slate-100 flex">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar sticky top-0 h-screen flex flex-col flex-shrink-0 transition-all duration-300"
    [class.sidebar--open]="isSidebarOpen"
    [class.sidebar--collapsed]="!isSidebarOpen">

    <!-- Logo + toggle -->
    <div class="sidebar__header">
      <span class="sidebar__logo" *ngIf="isSidebarOpen">cinefilia</span>
      <button class="sidebar__toggle" (click)="toggleSidebar()" [title]="isSidebarOpen ? 'Collapse' : 'Expand'">
        <svg *ngIf="isSidebarOpen" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7M18 19l-7-7 7-7"/></svg>
        <svg *ngIf="!isSidebarOpen" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M6 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Nav -->
    <nav class="sidebar__nav">
      <a class="nav-item" routerLink="/dashboard/home" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'Home' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">Home</span>
      </a>
      <a class="nav-item" routerLink="/dashboard/movies" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'Movies' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">Movies</span>
      </a>
      <a class="nav-item" routerLink="/dashboard/series" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'Series' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">Series</span>
      </a>
      <a class="nav-item" routerLink="/dashboard/rentals" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'My Rentals' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.53 15.47 0 12.36 0c-1.73 0-3.24.86-4.19 2.18L12 6H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">My Rentals</span>
      </a>
      <a class="nav-item" routerLink="/dashboard/transactions" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'Transactions' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">Transactions</span>
      </a>
      <a class="nav-item" routerLink="/dashboard/watchlist" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'Watchlist' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">Watchlist</span>
      </a>
      <a class="nav-item" routerLink="/dashboard/my-ratings" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'My Ratings' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">My Ratings</span>
      </a>
      <a class="nav-item" routerLink="/dashboard/profile" routerLinkActive="nav-item--active" [title]="!isSidebarOpen ? 'Profile' : ''">
        <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        <span class="nav-item__label" *ngIf="isSidebarOpen">Profile</span>
      </a>
    </nav>

    <!-- Logout -->
    <button class="sidebar__logout" (click)="logout()" [title]="!isSidebarOpen ? 'Logout' : ''">
      <svg class="nav-item__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      <span class="nav-item__label" *ngIf="isSidebarOpen">Logout</span>
    </button>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="flex-1 min-w-0">
    <header class="sticky top-0 z-20 bg-slate-950/95 border-b border-slate-800 px-6 py-3">
      <div class="flex items-center gap-4">
        <div class="flex-1 max-w-3xl relative flex items-center">
          <input
            [formControl]="searchControl"
            (focus)="isSearchFocused = true"
            (blur)="isSearchFocused = false"
            placeholder="Search films, directors, cast..."
            class="w-full bg-slate-900 border border-fuchsia-600 rounded-full px-5 py-2 outline-none focus:ring-2 focus:ring-fuchsia-500 neon-border pr-10"
          />
          <button *ngIf="searchControl.value" class="absolute right-3 text-slate-400 hover:text-white text-sm" (click)="clearSearch()" title="Clear search">✕</button>
        </div>
        <div class="flex items-center gap-2 ml-auto">
          <!-- Notification bell -->
          <div class="relative">
            <button class="top-icon-btn relative" (click)="toggleNotifDropdown()" title="Notifications">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
              <span *ngIf="unreadNotifications > 0" class="notif-badge">{{ unreadNotifications }}</span>
            </button>

            <!-- Dropdown -->
            <div *ngIf="showNotifDropdown" class="notif-dropdown">
              <div class="notif-dropdown__header">
                <span class="notif-dropdown__title">Notifications</span>
                <div class="flex items-center gap-2">
                  <span *ngIf="unreadNotifications > 0" class="notif-dropdown__unread-count">{{ unreadNotifications }} new</span>
                  <button class="notif-dropdown__close" (click)="closeNotifDropdown()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                  </button>
                </div>
              </div>

              <div *ngIf="recentNotifications.length === 0" class="notif-dropdown__empty">
                <p>All caught up</p>
              </div>

              <div class="notif-dropdown__list">
                <div *ngFor="let n of recentNotifications" class="notif-dropdown__item"
                  [class.notif-dropdown__item--unread]="!n.isRead"
                  (click)="handleNotifClick(n)">
                  <div class="notif-dropdown__type-bar" [attr.data-type]="n.type"></div>
                  <div class="notif-dropdown__content">
                    <p class="notif-dropdown__item-title">{{ n.title }}</p>
                    <p class="notif-dropdown__item-msg">{{ n.message }}</p>
                  </div>
                  <span *ngIf="!n.isRead" class="notif-dropdown__dot"></span>
                </div>
              </div>

              <div class="notif-dropdown__footer">
                <button class="notif-dropdown__see-all" (click)="openNotifPage()">
                  View all notifications
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg>
                </button>
              </div>
            </div>
          </div>
          <button class="top-icon-btn relative" routerLink="/dashboard/cart" title="Cart">
            🛒
            <span class="absolute -top-2 -right-2 bg-amber-500 text-black text-xs rounded-full px-1.5">{{ cartCount }}</span>
          </button>
          <button class="top-icon-btn" routerLink="/dashboard/profile" title="Profile">👤</button>
        </div>
      </div>
    </header>

    <section class="p-6">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
