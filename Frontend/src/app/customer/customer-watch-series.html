<div class="fixed inset-0 bg-black flex flex-col z-50">

  <!-- Top bar -->
  <div class="flex items-center gap-4 px-4 py-3 bg-black/80 backdrop-blur-sm border-b border-slate-800 shrink-0">
    <button (click)="goBack()" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back
    </button>
    <div class="flex-1 min-w-0">
      <h1 class="text-base font-semibold text-white truncate">{{ series?.title }}</h1>
      <p *ngIf="selectedSeason && selectedEpisode" class="text-xs text-slate-400">
        S{{ selectedSeason.seasonNumber }}E{{ selectedEpisode.episodeNumber }} — {{ selectedEpisode.title }}
      </p>
    </div>
  </div>

  <div class="flex flex-1 min-h-0">

    <!-- Player -->
    <div class="flex-1 relative bg-black">
      <div *ngIf="loading" class="absolute inset-0 flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-fuchsia-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
      <iframe
        *ngIf="!loading && embedUrl"
        [src]="embedUrl"
        class="w-full h-full"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowfullscreen>
      </iframe>
    </div>

    <!-- Episode sidebar -->
    <div class="w-72 bg-slate-950 border-l border-slate-800 flex flex-col overflow-hidden shrink-0">

      <!-- Season tabs -->
      <div class="flex gap-1 p-3 border-b border-slate-800 overflow-x-auto">
        <button *ngFor="let season of series?.seasons"
          class="px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap transition-colors shrink-0"
          [class.bg-fuchsia-600]="selectedSeason?.id === season.id"
          [class.text-white]="selectedSeason?.id === season.id"
          [class.bg-slate-800]="selectedSeason?.id !== season.id"
          [class.text-slate-400]="selectedSeason?.id !== season.id"
          (click)="selectSeason(season)">
          S{{ season.seasonNumber }}
        </button>
      </div>

      <!-- Season title + rating -->
      <div *ngIf="selectedSeason" class="px-3 py-2 border-b border-slate-800">
        <p class="text-slate-200 text-sm font-medium">{{ selectedSeason.title }}</p>
        <div class="flex items-center gap-2 mt-0.5">
          <span class="text-slate-500 text-xs">{{ selectedSeason.releaseYear }}</span>
          <span *ngIf="selectedSeason.averageRating > 0" class="text-amber-400 text-xs">★ {{ selectedSeason.averageRating | number:'1.1-1' }}</span>
        </div>
      </div>

      <!-- Episodes list -->
      <div class="flex-1 overflow-y-auto">
        <button *ngFor="let ep of selectedSeason?.episodes"
          class="w-full text-left px-3 py-3 border-b border-slate-800/50 transition-colors"
          [class.bg-fuchsia-900]="selectedEpisode?.id === ep.id"
          [class.border-l-2]="selectedEpisode?.id === ep.id"
          [class.border-l-fuchsia-500]="selectedEpisode?.id === ep.id"
          [class.hover:bg-slate-800]="selectedEpisode?.id !== ep.id"
          (click)="selectEpisode(ep)">
          <div class="flex items-start gap-2">
            <span class="text-fuchsia-400 font-mono text-xs w-5 shrink-0 mt-0.5">{{ ep.episodeNumber }}</span>
            <div class="flex-1 min-w-0">
              <p class="text-slate-200 text-xs font-medium truncate">{{ ep.title }}</p>
              <p class="text-slate-500 text-xs mt-0.5 line-clamp-2">{{ ep.description }}</p>
              <p class="text-slate-600 text-xs mt-1">{{ ep.durationMinutes }}m</p>
            </div>
          </div>
        </button>
      </div>

    </div>
  </div>

</div>
