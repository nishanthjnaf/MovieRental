<!-- Header -->
<div class="notif-page-header">
  <div>
    <h1 class="notif-page-header__title">Notifications</h1>
    <p class="notif-page-header__sub" *ngIf="!loading && notifications.length > 0">{{ notifications.length }} total</p>
  </div>
  <button *ngIf="unreadCount > 0" class="notif-page-header__mark-all" (click)="markAllRead()">
    Mark all as read
  </button>
</div>

<!-- Skeleton -->
<div *ngIf="loading" class="notif-page-list">
  <div *ngFor="let i of [1,2,3,4]" class="notif-page-skeleton">
    <div class="notif-page-skeleton__icon skeleton"></div>
    <div class="notif-page-skeleton__body">
      <div class="h-3 w-1/3 rounded skeleton mb-2"></div>
      <div class="h-3 w-2/3 rounded skeleton"></div>
    </div>
  </div>
</div>

<!-- Empty -->
<div *ngIf="!loading && notifications.length === 0" class="notif-page-empty">
  <p>No notifications yet</p>
</div>

<!-- List -->
<div *ngIf="!loading && notifications.length > 0" class="notif-page-list">
  <div *ngFor="let n of notifications" class="notif-page-item"
    [class.notif-page-item--unread]="!n.isRead"
    (click)="handleClick(n)">

    <!-- Type bar -->
    <div class="notif-page-item__type-bar" [attr.data-type]="n.type"></div>

    <!-- Content -->
    <div class="notif-page-item__body">
      <div class="notif-page-item__top">
        <p class="notif-page-item__title" [class.notif-page-item__title--unread]="!n.isRead">{{ n.title }}</p>
        <span class="notif-page-item__time">{{ n.createdAt | date:'MMM d, h:mm a' }}</span>
      </div>
      <p class="notif-page-item__msg">{{ n.message }}</p>
    </div>

    <!-- Unread dot + dismiss -->
    <div class="notif-page-item__actions">
      <span *ngIf="!n.isRead" class="notif-page-item__dot"></span>
      <button class="notif-page-item__dismiss" (click)="delete(n, $event)" title="Dismiss">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

  </div>
</div>
