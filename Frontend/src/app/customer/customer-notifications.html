<div class="flex items-center justify-between mb-6">
  <h2 class="text-4xl font-bold text-amber-300">Notifications</h2>
  <button *ngIf="unreadCount > 0" class="text-sm text-fuchsia-400 hover:text-fuchsia-300" (click)="markAllRead()">
    Mark all as read
  </button>
</div>

<div *ngIf="loading" class="space-y-3">
  <div *ngFor="let i of [1,2,3]" class="h-16 rounded-xl skeleton"></div>
</div>

<div *ngIf="!loading && notifications.length === 0" class="text-slate-400 py-12 text-center">
  No notifications yet.
</div>

<div *ngIf="!loading" class="space-y-2">
  <div
    *ngFor="let n of notifications"
    (click)="handleClick(n)"
    class="flex items-start gap-3 p-4 rounded-xl border cursor-pointer transition"
    [class.bg-slate-900]="n.isRead"
    [class.border-slate-800]="n.isRead"
    [class.bg-slate-800]="!n.isRead"
    [class.border-fuchsia-700]="!n.isRead"
  >
    <span class="text-2xl mt-0.5 shrink-0">{{ iconFor(n.type) }}</span>
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-2">
        <p class="font-semibold text-sm" [class.text-white]="!n.isRead" [class.text-slate-300]="n.isRead">
          {{ n.title }}
        </p>
        <span class="text-xs text-slate-500 shrink-0">{{ n.createdAt | date:'MMM d, h:mm a' }}</span>
      </div>
      <p class="text-sm text-slate-400 mt-0.5">{{ n.message }}</p>
    </div>
    <button class="text-slate-600 hover:text-red-400 text-xs shrink-0 mt-0.5" (click)="delete(n, $event)" title="Dismiss">✕</button>
  </div>
</div>
