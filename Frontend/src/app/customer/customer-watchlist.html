<h2 class="text-4xl font-bold text-amber-300 mb-6">Watchlist</h2>

<div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
  <div *ngFor="let i of [1,2,3,4]" class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
    <div class="h-40 skeleton"></div>
    <div class="p-3 space-y-2">
      <div class="h-4 rounded skeleton"></div>
      <div class="h-8 rounded skeleton"></div>
    </div>
  </div>
</div>

<div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
  <article *ngFor="let i of items" class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
    <img [src]="i.movie?.posterPath || 'https://placehold.co/400x220'" class="h-40 w-full object-cover cursor-pointer" (click)="open(i.movieId)">
    <div class="p-3">
      <h3 class="font-semibold truncate">{{ i.movie?.title || i.movieTitle }}</h3>
      <div class="flex justify-between mt-2">
        <button class="bg-orange-600 hover:bg-orange-500 px-3 py-1 rounded text-sm" (click)="addToCart(i)">Add To Cart</button>
        <button class="bg-fuchsia-700 hover:bg-fuchsia-600 px-3 py-1 rounded text-sm" (click)="remove(i.id)">Remove</button>
      </div>
    </div>
  </article>
</div>

<p *ngIf="!loading && items.length === 0" class="text-slate-400">Watchlist is empty.</p>

<div *ngIf="showConfirmPopup" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-slate-900 border border-slate-700 rounded-xl p-6 w-[92%] max-w-sm text-center">
    <p class="text-lg font-semibold mb-2">Remove from Watchlist</p>
    <p class="text-slate-400 text-sm mb-6">Are you sure you want to remove this movie from your watchlist?</p>
    <div class="flex justify-center gap-3">
      <button class="px-5 py-2 rounded bg-slate-700 hover:bg-slate-600" (click)="cancelRemove()">Cancel</button>
      <button class="px-5 py-2 rounded bg-red-700 hover:bg-red-600 font-semibold" (click)="confirmRemove()">Remove</button>
    </div>
  </div>
</div>
